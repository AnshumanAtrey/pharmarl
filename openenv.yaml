spec_version: 1
name: pharmarl
type: space
runtime: fastapi
app: server.app:app
port: 8000
description: >
  PharmaRL — first OpenEnv-native LLM-as-policy environment for iterative
  molecular optimization. Stage 1 scores against the DRD2 dopamine D2
  receptor classifier (canonical MOSES/GuacaMol molRL benchmark) plus QED,
  SA, and CYP3A4 toxicity. Agent edits SELFIES strings across 10-20 steps
  with composite reward shaping (binding + drug-likeness + synthesizability
  + toxicity penalty + Lipinski gate). Stage 2 (PHARMARL_ENABLE_DOCKING=1)
  swaps the binding component for pyscreener-backed docking against
  NSP15 / EGFR / ABL / BACE1 — requires OpenBabel + AutoDock Vina on host.
version: "0.1.0"
tasks:
  - id: trivial
    name: Single-Property Optimization
    difficulty: trivial
    max_steps: 10
    description: "Start from a known scaffold. Optimize QED only. 5-fragment vocabulary. Guaranteed learnable in <100 GRPO steps."
  - id: easy
    name: Two-Property Optimization
    difficulty: easy
    max_steps: 15
    description: "Start from a scaffold. Optimize QED + binding affinity. 15-fragment vocabulary."
  - id: hard
    name: De Novo Design
    difficulty: hard
    max_steps: 20
    description: "Start from a single carbon. Full 4-component reward (affinity, QED, SA, toxicity). 50-fragment vocabulary. TERMINATE action required."
actions:
  - ADD_FRAGMENT
  - REMOVE_FRAGMENT
  - SUBSTITUTE_ATOM
  - TERMINATE
oracles:
  - tdc_drd2_classifier  # default Stage 1 binding oracle
  - rdkit_qed
  - rdkit_sa
  - tdc_cyp3a4_toxicity
  # Stage 2 docking targets (require pyscreener + Vina + OpenBabel):
  - tdc_7l11_docking_normalize  # SARS-CoV-2 NSP15
  - tdc_2rgp_docking_normalize  # EGFR T790M
  - tdc_1iep_docking_normalize  # ABL kinase
  - tdc_4rlu_docking_normalize  # BACE1 (Alzheimer's)
